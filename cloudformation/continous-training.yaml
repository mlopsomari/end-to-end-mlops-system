AWSTemplateFormatVersion: '2010-09-09'
Description: 'Continous Training - User account and custom policies.'

Parameters:
  UserName:
    Type: String
    Description: 'User name for the IAM User'

Resources:
  User:
    Type: 'AWS::IAM::User'
    Properties:
      UserName: !Ref UserName

  UserCredentials:
    Type: AWS::IAM::AccessKey
    Properties:
      Status: Active
      UserName: !Ref User

  UserCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: '/credentials/continous-training'
      SecretString: !GetAtt UserCredentials.SecretAccessKey

  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          Effect: Allow
          Action: sts:AssumeRole
          Principal:
            AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Service:
              - sagemaker.amazonaws.com

      Path: /
      Policies:
        - PolicyName: "continous-training-custom-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              - Effect: "Allow"
                Sid: "CloudFormation"
                Action:
                  - "cloudformation:CreateStack"
                  - "cloudformation:DeleteStack"
                  - "cloudformation:UpdateStack"
                  - "cloudformation:DescribeStacks"
                  - "cloudformation:DescribeStackEvents"
                  - "cloudformation:DescribeStackResource"
                  - "cloudformation:DescribeStackResources"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "Batch"
                Action:
                  - "batch:TerminateJob"
                  - "batch:DescribeJobs"
                  - "batch:DescribeJobDefinitions"
                  - "batch:DescribeJobQueues"
                  - "batch:RegisterJobDefinition"
                  - "batch:SubmitJob"
                  - "batch:DescribeComputeEnvironments"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "Events"
                Action:
                  - "events:PutTargets"
                  - "events:DescribeRule"
                  - "events:DisableRule"
                  - "events:PutRule"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "IAM"
                Action:
                  - "iam:PassRole"
                  - "iam:GetRole"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "EC2"
                Action:
                  - "ec2:CreateKeyPair"
                  - "ec2:DeleteKeyPair"
                  - "ec2:DescribeKeyPairs"
                  - "ec2:CreateSecurityGroup"
                  - "ec2:DeleteSecurityGroup"
                  - "ec2:DescribeSecurityGroups"
                  - "ec2:AuthorizeSecurityGroupIngress"
                  - "ec2:RevokeSecurityGroupIngress"
                  - "ec2:RunInstances"
                  - "ec2:TerminateInstances"
                  - "ec2:DescribeInstances"
                  - "ec2:CreateTags"
                  - "ec2:DescribeImages"
                  - "ec2:DescribeAccountAttributes"
                  - "ec2:DescribeAddresses"
                  - "ec2:DescribeAvailabilityZones"
                  - "ec2:DescribeClassicLinkInstances"
                  - "ec2:DescribeClientVpnEndpoints"
                  - "ec2:DescribeCustomerGateways"
                  - "ec2:DescribeDhcpOptions"
                  - "ec2:DescribeEgressOnlyInternetGateways"
                  - "ec2:DescribeFlowLogs"
                  - "ec2:DescribeInternetGateways"
                  - "ec2:DescribeManagedPrefixLists"
                  - "ec2:DescribeMovingAddresses"
                  - "ec2:DescribeNatGateways"
                  - "ec2:DescribeNetworkAcls"
                  - "ec2:DescribeNetworkInterfaceAttribute"
                  - "ec2:DescribeNetworkInterfacePermissions"
                  - "ec2:DescribeNetworkInterfaces"
                  - "ec2:DescribePrefixLists"
                  - "ec2:DescribeRouteTables"
                  - "ec2:DescribeSecurityGroupReferences"
                  - "ec2:DescribeSecurityGroups"
                  - "ec2:DescribeSecurityGroupRules"
                  - "ec2:DescribeStaleSecurityGroups"
                  - "ec2:DescribeSubnets"
                  - "ec2:DescribeTags"
                  - "ec2:DescribeTrafficMirrorFilters"
                  - "ec2:DescribeTrafficMirrorSessions"
                  - "ec2:DescribeTrafficMirrorTargets"
                  - "ec2:DescribeTransitGateways"
                  - "ec2:DescribeTransitGatewayVpcAttachments"
                  - "ec2:DescribeTransitGatewayRouteTables"
                  - "ec2:DescribeVpcAttribute"
                  - "ec2:DescribeVpcClassicLink"
                  - "ec2:DescribeVpcClassicLinkDnsSupport"
                  - "ec2:DescribeVpcEndpoints"
                  - "ec2:DescribeVpcEndpointConnectionNotifications"
                  - "ec2:DescribeVpcEndpointConnections"
                  - "ec2:DescribeVpcEndpointServiceConfigurations"
                  - "ec2:DescribeVpcEndpointServicePermissions"
                  - "ec2:DescribeVpcEndpointServices"
                  - "ec2:DescribeVpcPeeringConnections"
                  - "ec2:DescribeVpcs"
                  - "ec2:DescribeVpnConnections"
                  - "ec2:DescribeVpnGateways"
                  - "ec2:GetManagedPrefixListAssociations"
                  - "ec2:GetManagedPrefixListEntries"
                  - "ec2:CreateVpc"
                  - "ec2:CreateSubnet"
                  - "ec2:DescribeAvailabilityZones"
                  - "ec2:CreateRouteTable"
                  - "ec2:CreateRoute"
                  - "ec2:CreateInternetGateway"
                  - "ec2:AttachInternetGateway"
                  - "ec2:AssociateRouteTable"
                  - "ec2:ModifyVpcAttribute"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "ECR"
                Action:
                  - "ecr:DescribeRepositories"
                  - "ecr:CreateRepository"
                  - "ecr:GetAuthorizationToken"
                  - "ecr:InitiateLayerUpload"
                  - "ecr:UploadLayerPart"
                  - "ecr:CompleteLayerUpload"
                  - "ecr:BatchCheckLayerAvailability"
                  - "ecr:GetDownloadUrlForLayer"
                  - "ecr:BatchGetImage"
                  - "ecr:DeleteRepository"
                  - "ecr:PutImage"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "SageMaker"
                Action:
                  - "sagemaker:ListEndpoints"
                  - "sagemaker:DescribeEndpoint"
                  - "sagemaker:CreateEndpoint"
                  - "sagemaker:UpdateEndpoint"
                  - "sagemaker:DescribeEndpointConfig"
                  - "sagemaker:CreateEndpointConfig"
                  - "sagemaker:DescribeModel"
                  - "sagemaker:CreateModel"
                  - "sagemaker:DeleteEndpoint"
                  - "sagemaker:ListTags"
                  - "sagemaker:AddTags"
                  - "sagemaker:InvokeEndpoint"
                Resource:
                  - "*"

              - Effect: "Allow"
                Sid: "SSM"
                Action:
                  - "ssm:GetParameter"
                  - "ssm:GetParameters"
                  - "ssm:PutParameter"
                  - "ssm:DeleteParameter"
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ec2/keypair/*"

              - Effect: "Allow"
                Sid: "States"
                Action:
                  - "states:ListStateMachines"
                  - "states:DescribeStateMachine"
                  - "states:UpdateStateMachine"
                  - "states:StartExecution"
                  - "states:CreateStateMachine"
                  - "states:ListExecutions"
                  - "states:StopExecution"
                Resource:
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:*'

              - Effect: "Allow"
                Sid: "S3"
                Action:
                  - "s3:CreateBucket"
                  - "s3:ListBucket"
                  - "s3:ListAllMyBuckets"
                  - "s3:GetBucketLocation"
                  - "s3:PutObject"
                  - "s3:PutObjectTagging"
                  - "s3:GetObject"
                  - "s3:DeleteObject"
                Resource:
                  - !Sub "arn:aws:s3:::*"

              - Effect: "Allow"
                Sid: "CloudWatchLogs"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                  - "logs:DescribeLogStreams"
                Resource: "*"

  Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'continous-training-${AWS::AccountId}'

  UserPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: AssumeRolePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'sts:AssumeRole'
            Resource: !GetAtt 'Role.Arn'
      Users:
        - !Ref User

Outputs:
  User:
    Description: The user account we'll use to configure the AWS CLI and authenticate with AWS.
    Value: !Ref User

  AccessKeyId:
    Description: >
      The Access Key ID associated with the user. To get access to the Secret Access Key, 
      navigate to the Secrets Manager service in the AWS console and retrieve the secret value 
      related to the `/credentials/continous-training` key.
    Value: !Ref UserCredentials

  Region:
    Description: The AWS Region where the program resources will be provisioned.
    Value: !Ref 'AWS::Region'

  Role:
    Description: 'The Role ARN associated with the user.'
    Value: !GetAtt 'Role.Arn'

  Bucket:
    Description: The name of the S3 bucket
    Value: !Ref Bucket
